name: gg_tree
description: gg_tree organizes data in a tree and allows to search or reference other tree items
version: 2.0.9
repository: https://github.com/ggsuite/gg_tree.git

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  path: ^1.9.1
  json_annotation: ^4.11.0

  gg_json: ^3.0.19

dev_dependencies:
  build_runner: ^2.12.2
  gg_golden: ^3.0.0
  gg_test_matchers: ^1.1.2
  json_serializable: ^6.13.0
  lints: ^6.1.0
  test: ^1.30.0
